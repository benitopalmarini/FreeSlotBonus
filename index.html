<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SlotsWise Exclusive Bonus</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#0d0d0d;
    color:white;
    text-align:center;
}

header {
    padding:60px 20px;
    background:linear-gradient(90deg,#1a1a1a,#000);
}

h1 {
    color:#ffd700;
}

.cta {
    display:inline-block;
    background:#ff0000;
    color:white;
    padding:18px 35px;
    font-size:1.2em;
    border-radius:8px;
    text-decoration:none;
    font-weight:bold;
    margin-top:20px;
}
    

.cta:hover {
    background:#cc0000;
}

/* POPUP */
.popup {
    display:none;
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.8);
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.popup-content {
    background:#111;
    padding:40px;
    border-radius:15px;
    text-align:center;
    box-shadow:0 0 30px red;
    max-width:400px;
    animation:pop 0.5s ease;
}

@keyframes pop {
    from {transform:scale(0.5);}
    to {transform:scale(1);}
}

.slot {
    font-size:2em;
    margin:20px 0;
}

.jackpot {
    color:gold;
    font-size:1.8em;
}

footer {
    padding:20px;
    font-size:0.9em;
    background:#000;
    color:#aaa;
}
</style>
</head>

<body>

<header>
    <h1>🎰 Claim Your Slots Bonus Now</h1>
    <p>Limited Time Offer – Play & Win Big</p>
    <a href="http://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885" class="cta">🔥 Play Now</a>
</header>

<footer>
    © 2026 SlotsWise Promo | 18+ Only | Affiliate Site
</footer>

<!-- Jackpot Popup -->
<div class="popup" id="popup">
    <div class="popup-content">
        <h2>🎰 Slot Machine Spinning...</h2>
        <div class="slot" id="slot">🍒 🍋 🔔</div>
        <div class="jackpot" id="jackpot"></div>
        <a href="http://convert.ctypy.com/aff_c?offer_id=29526&aff_id=21885" class="cta">🎉 Claim Your Bonus</a>
    </div>
</div>

<script>
setTimeout(function(){
    document.getElementById("popup").style.display="flex";
    spin();
}, 5000);

function spin() {
    let icons = ["🍒","🍋","🔔","💎","7️⃣"];
    let slot = document.getElementById("slot");
    let jackpot = document.getElementById("jackpot");

    let count = 0;
    let spinning = setInterval(function(){
        slot.innerHTML =
            icons[Math.floor(Math.random()*icons.length)] + " " +
            icons[Math.floor(Math.random()*icons.length)] + " " +
            icons[Math.floor(Math.random()*icons.length)];
        count++;
        if(count > 15){
            clearInterval(spinning);
            slot.innerHTML="7️⃣ 7️⃣ 7️⃣";
            jackpot.innerHTML="🎉 JACKPOT WIN! 🎉";
        }
    }, 150);
}
</script>

</body>
</html>
